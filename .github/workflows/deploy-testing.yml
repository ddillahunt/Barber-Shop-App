name: Deploy Testing to AWS Amplify

on:
  push:
    branches: [testing]

jobs:
  deploy-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to AWS Amplify (testing)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          cd dist && zip -r ../deploy.zip . && cd ..
          aws amplify create-deployment --app-id ddb3xvawthiyv --branch-name testing > deployment.json
          UPLOAD_URL=$(python3 -c "import json; print(json.load(open('deployment.json'))['zipUploadUrl'])")
          JOB_ID=$(python3 -c "import json; print(json.load(open('deployment.json'))['jobId'])")
          curl -T deploy.zip "$UPLOAD_URL" --header "Content-Type: application/zip"
          aws amplify start-deployment --app-id ddb3xvawthiyv --branch-name testing --job-id "$JOB_ID"
